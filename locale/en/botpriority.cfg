[item-name]
botpriority-selector=Bot Priority

[item-description]
botpriority-selector=Select ghosts, deconstruction orders, or upgrade orders to prioritize. Matching work outside the selection is paused until cleared or finished.

[shortcut-name]
botpriority-shortcut=Bot Priority

[shortcut-description]
botpriority-shortcut=Put the Bot Priority selection tool in the cursor.

[mod-setting-name]
botpriority-operations-per-tick=Bot Priority operations per tick
botpriority-safe-uninstall=Bot Priority safe uninstall

[mod-setting-description]
botpriority-operations-per-tick=How many pause, restore, and refresh operations Bot Priority may process per tick.
botpriority-safe-uninstall=Restore all Bot Priority changes, merge away backlog forces, and prepare the save so the mod can be removed safely.

[botpriority-message]
applied=Bot Priority paused __1__ ghost(s), __2__ deconstruction order(s), and __3__ upgrade order(s); refreshed __4__ ghost(s), __5__ deconstruction order(s), and __6__ upgrade order(s).__7__
cleared=Bot Priority restored __1__ ghost(s), __2__ deconstruction order(s), and __3__ upgrade order(s).
no-selection=Bot Priority found no supported ghosts, deconstruction orders, or upgrade orders on your force in the selected area.
busy=Bot Priority is still processing the previous request.
already-clear=Bot Priority has no active priority batch to clear.
unsupported-other-force= Ignored __1__ selected item(s) that were not on your force.
surface-missing=Bot Priority could not find the selected surface.
force-missing=Bot Priority could not find the source force for this batch.
cleanup-setting-on=Bot Priority safe-uninstall mode is enabled. Wait for cleanup to finish or turn the setting off before using the tool.
cleanup-started=Bot Priority started safe-uninstall cleanup. Wait for the completion message before removing the mod.
cleanup-running=Bot Priority safe-uninstall cleanup is already running.
cleanup-finished=Bot Priority safe-uninstall cleanup finished. Restored __1__ ghost(s), __2__ deconstruction order(s), and __3__ upgrade order(s), removed __4__ backlog force(s), and clone surface cleanup: __5__. You can now save and remove the mod.
cleanup-disabled=Bot Priority safe-uninstall mode is off.
